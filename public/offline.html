<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>غير متصل — سوق تقبيل</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
.card{max-width:360px}
.icon{font-size:3rem;margin-bottom:1rem}
h1{font-size:1.25rem;font-weight:700;margin-bottom:.5rem}
p{font-size:.875rem;color:#94a3b8;line-height:1.6;margin-bottom:1.5rem}
button{background:#c9a44a;color:#0f172a;border:none;padding:.625rem 1.5rem;border-radius:.75rem;font-size:.8125rem;font-weight:600;cursor:pointer;font-family:inherit}
button:hover{opacity:.9}
</style>
</head>
<body>
<div class="card">
<div class="icon">📡</div>
<h1>لا يوجد اتصال بالإنترنت</h1>
<p>يبدو أنك غير متصل بالإنترنت حالياً. تحقق من اتصالك وحاول مرة أخرى.</p>
<button onclick="location.reload()">إعادة المحاولة</button>
</div>
</body>
</html>
